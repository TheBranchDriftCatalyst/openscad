pytest = "^8.3.4"
pytest-mock = "^3.14.0"
pyproject-flake8 = "^7.0.0"
flake8-black = "^0.3.6"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.mypy]
plugins = ['pydantic.mypy']
